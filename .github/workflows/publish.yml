name: Publish Release

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    runs-on: macOS-latest
    if: github.repository == 'afreakyelf/Pdf-Viewer'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Resolve version from tag
        run: echo "PUBLISH_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish release
        run: ./gradlew publishAllPublicationsToMavenCentralRepository -PPUBLISH_VERSION="$PUBLISH_VERSION"
        env:
          PUBLISH_VERSION: ${{ env.PUBLISH_VERSION }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
